version: "3.9"
services:
  depression-service:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../services/depression-service/src:/app
      - ../requirements-backend.txt:/tmp/requirements.txt
    command: sh -c "pip install -r /tmp/requirements.txt && uvicorn depression_service.main:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"

  ppg-service:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../services/ppg-service/src:/app
      - ../requirements-backend.txt:/tmp/requirements.txt
    command: sh -c "pip install -r /tmp/requirements.txt && uvicorn ppg_service.main:app --host 0.0.0.0 --port 8002"
    ports:
      - "8002:8002"

  orchestrator-service:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../services/orchestrator-service/src:/app
      - ../requirements-backend.txt:/tmp/requirements.txt
    command: sh -c "pip install -r /tmp/requirements.txt && uvicorn orchestrator_service.main:app --host 0.0.0.0 --port 8003"
    ports:
      - "8003:8003"

  kineticare-service:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../services/kineticare-service/src:/app
      - ../requirements-backend.txt:/tmp/requirements.txt
    command: sh -c "pip install -r /tmp/requirements.txt && uvicorn kineticare_service.main:app --host 0.0.0.0 --port 8004"
    ports:
      - "8004:8004"
